<!DOCTYPE html>
<html>
<head>
    <title>Nabil Pro Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, black, #111);
            color: white;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: #000;
        }

        .navbar a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: red;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 80px 20px;
            animation: fadeIn 2s ease-in;
        }

        .hero h1 {
            color: red;
            font-size: 45px;
            animation: slideDown 1s ease;
        }

        .hero p {
            color: yellow;
        }

        /* Button */
        .btn {
            background: red;
            padding: 10px 20px;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }

        /* Sections */
        .section {
            padding: 50px;
            text-align: center;
        }

        .card {
            background: #222;
            margin: 10px;
            padding: 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.1);
        }

        /* Flex */
        .flex {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Image */
        img {
            border-radius: 50%;
            border: 3px solid white;
            margin: 20px 0;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.1);
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width:600px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>Nabil 😎</h2>
        <div>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Skills</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <h1>I am Nabil 🔥</h1>
        <p>Future Web Designer 💻</p>
        <a href="#" class="btn" id="hireBtn">Hire Me</a>
    </div>

    <!-- Image -->
    <div class="section">
        <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39" width="200">
    </div>

    <!-- About -->
    <div class="section">
        <h2>About Me</h2>
        <p>Mujhe web designing pasand hai aur main pro banna chahta hoon</p>
    </div>

    <!-- Skills -->
    <div class="section">
        <h2>My Skills</h2>
        <div class="flex">
            <div class="card">HTML</div>
            <div class="card">CSS</div>
            <div class="card">Flexbox</div>
            <div class="card">JavaScript</div>
        </div>
    </div>

    <!-- Contact -->
    <div class="section">
        <h2>Contact Me</h2>
        <p>Email: nabil@email.com</p>
    </div>

    <!-- JavaScript -->
    <script>
    document.getElementById("hireBtn").onclick = function() {
        alert("Thank you for visiting my website 😎🔥");
    }
    </script>

</body>
</html>
